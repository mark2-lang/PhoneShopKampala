<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone shop kampala</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --primary: #0f4c81;
      --primary-dark: #0a3559;
      --border: #d1d5db;
      --seg-a: #e5edf5;
      --seg-b: #cfdceb;
      --seg-c: #dfe7ef;
      --seg-d: #bfcfdf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    .container {
      width: min(95vw, 720px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.1);
      text-align: center;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      letter-spacing: 0.4px;
      font-weight: 700;
      color: #0f172a;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      text-transform: capitalize;
    }

    .wheel-wrap {
      position: relative;
      width: min(80vw, 420px);
      margin: 0 auto;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-top: 30px solid var(--primary-dark);
      margin: 0 auto -4px;
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.2));
      z-index: 2;
      position: relative;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 50%;
      border: 8px solid #ffffff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.2);
      background: #fff;
    }

    .center-cap {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #ffffff;
      border: 6px solid var(--primary);
      position: absolute;
      inset: 0;
      margin: auto;
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .actions {
      margin-top: 22px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 20px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: #145a93;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .result {
      min-height: 26px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 600;
    }

    .history {
      margin-top: 20px;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #f8fbff;
    }

    .history h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: #0f172a;
      text-align: center;
    }

    .history ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
    }

    .history li {
      border: 1px solid #dbe4ee;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.93rem;
      color: #1e293b;
      background: #ffffff;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Phone shop kampala</h1>

    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="500" height="500"></canvas>
      <div class="center-cap">SPIN</div>
    </div>

    <div class="actions">
      <button id="spinBtn" type="button">Spin Wheel</button>
      <p id="result" class="result" aria-live="polite"></p>
    </div>

    <section class="history">
      <h2>Winner History</h2>
      <ul id="historyList"></ul>
    </section>
  </main>

  <script>
    const prizes = [
      "Try Again",
      "Samsung Charger",
      "Try Again",
      "Accessories",
      "Try Again",
      "Samsung Phone",
      "Try Again"
    ];

    // Zero probability for Samsung Phone by never selecting index 5.
    const selectablePrizeIndexes = [0, 1, 2, 3, 4, 6];

    const palette = [
      "var(--seg-a)",
      "var(--seg-b)",
      "var(--seg-c)",
      "var(--seg-d)",
      "#d9e6f2",
      "#c5d8ea",
      "#e6eef7"
    ];

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const resultEl = document.getElementById("result");
    const historyList = document.getElementById("historyList");

    const winnerHistory = [];

    const center = canvas.width / 2;
    const radius = center - 8;
    const segmentAngle = (2 * Math.PI) / prizes.length;
    const twoPi = 2 * Math.PI;

    let currentRotation = 0;
    let spinning = false;

    function normalizeAngle(angle) {
      return ((angle % twoPi) + twoPi) % twoPi;
    }

    function getPrizeIndexAtPointer(rotation) {
      const pointerAligned = normalizeAngle(-rotation);
      return Math.floor(pointerAligned / segmentAngle) % prizes.length;
    }

    function maskLastFiveDigits(phone) {
      const digitsToHide = 5;
      if (phone.length <= digitsToHide) return "*".repeat(phone.length);
      return phone.slice(0, -digitsToHide) + "*".repeat(digitsToHide);
    }

    function randomDigits(length) {
      let out = "";
      for (let i = 0; i < length; i += 1) {
        out += Math.floor(Math.random() * 10);
      }
      return out;
    }

    function buildPhoneByCountry(country) {
      if (country === "Ugandan") return `+2567${randomDigits(8)}`;
      if (country === "Kenyan") return `+2547${randomDigits(8)}`;
      return `+2119${randomDigits(8)}`;
    }

    function seedWinnerHistory() {
      // Mixed pattern example: 5 Ugandans, 2 Kenyans, 3 Ugandans, 1 South Sudan.
      const countryPattern = [
        "Ugandan", "Ugandan", "Ugandan", "Ugandan", "Ugandan",
        "Kenyan", "Kenyan",
        "Ugandan", "Ugandan", "Ugandan",
        "South Sudan"
      ];
      const prizePool = ["Samsung Charger", "Accessories"];

      while (winnerHistory.length < 35) {
        const country = countryPattern[winnerHistory.length % countryPattern.length];
        winnerHistory.push({
          country,
          phone: buildPhoneByCountry(country),
          prize: prizePool[Math.floor(Math.random() * prizePool.length)]
        });
      }
    }

    function renderHistory() {
      historyList.innerHTML = "";
      winnerHistory.slice(0, 35).forEach((entry) => {
        const li = document.createElement("li");
        li.textContent = `${entry.country}: ${maskLastFiveDigits(entry.phone)} - ${entry.prize}`;
        historyList.appendChild(li);
      });
    }

    function drawWheel(rotation = 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      prizes.forEach((label, index) => {
        const start = rotation + index * segmentAngle - Math.PI / 2;
        const end = start + segmentAngle;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = palette[index % palette.length];
        ctx.fill();

        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.stroke();

        const textAngle = start + segmentAngle / 2;
        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(textAngle);
        ctx.textAlign = "right";
        ctx.fillStyle = "#1f2937";
        ctx.font = "bold 17px 'Segoe UI', Arial, sans-serif";
        ctx.fillText(label, radius - 18, 6);
        ctx.restore();
      });
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      resultEl.textContent = "Spinning...";

      const winningIndex = selectablePrizeIndexes[Math.floor(Math.random() * selectablePrizeIndexes.length)];
      const targetRotation = -(winningIndex * segmentAngle + segmentAngle / 2);
      const fullTurns = 7 + Math.floor(Math.random() * 2);
      const normalizedCurrent = normalizeAngle(currentRotation);
      const spinToTarget = normalizeAngle(targetRotation - normalizedCurrent);
      const startRotation = currentRotation;
      const endRotation = currentRotation + fullTurns * twoPi + spinToTarget;
      const duration = 4600;
      const startTime = performance.now();

      function animate(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const eased = easeOutCubic(t);
        currentRotation = startRotation + (endRotation - startRotation) * eased;
        drawWheel(currentRotation);

        if (t < 1) {
          requestAnimationFrame(animate);
          return;
        }

        spinning = false;
        spinBtn.disabled = false;

        const landedIndex = getPrizeIndexAtPointer(currentRotation);
        const landedPrize = prizes[landedIndex];
        resultEl.textContent = `Result: ${landedPrize}`;

        if (landedPrize !== "Try Again") {
          const countryRoll = Math.random();
          let country = "Ugandan";
          if (countryRoll > 0.7 && countryRoll <= 0.9) country = "Kenyan";
          if (countryRoll > 0.9) country = "South Sudan";

          winnerHistory.unshift({
            country,
            phone: buildPhoneByCountry(country),
            prize: landedPrize
          });
          renderHistory();
        }
      }

      requestAnimationFrame(animate);
    }

    spinBtn.addEventListener("click", spin);
    seedWinnerHistory();
    drawWheel(currentRotation);
    renderHistory();
  </script>
</body>
</html>
